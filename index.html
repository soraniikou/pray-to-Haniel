<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boundary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#050b14;
    font-family:'Zen Kaku Gothic New', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  canvas { display:block; }

  #veil {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#050b14;
    z-index:20;
    transition: opacity 1.8s ease;
  }
  #veil.hidden { opacity:0; pointer-events:none; }

  .phones {
    width:64px; height:64px;
    cursor:pointer;
    opacity:0.85;
    animation: breathe 3.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity:0.55; transform:scale(1); }
    50% { opacity:0.95; transform:scale(1.06); }
  }

  #startWrap {
    display:flex; flex-direction:column; align-items:center; gap:22px;
  }
  #startLabel {
    font-family:'Shippori Mincho', serif;
    color:#c9d4de;
    font-size:15px;
    letter-spacing:0.12em;
    opacity:0.75;
  }

  #choiceLayer {
    position:fixed; inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:9vh;
    z-index:15;
    pointer-events:none;
  }
  #choiceLayer.show { display:flex; }
  .choices {
    display:flex; gap:16vw;
    pointer-events:auto;
  }
  .choice-btn {
    background:none; border:none;
    font-family:'Shippori Mincho', serif;
    color:#dfe6ee;
    font-size:17px;
    letter-spacing:0.15em;
    padding:14px 6px;
    opacity:0;
    cursor:pointer;
    transition: opacity 1.6s ease, letter-spacing 0.4s ease, color 0.4s ease;
    border-bottom:1px solid rgba(223,230,238,0.25);
  }
  .choice-btn.visible { opacity:0.82; }
  .choice-btn:active { color:#f0d9a8; letter-spacing:0.22em; }

  #closing {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#050b14;
    opacity:0;
    pointer-events:none;
    transition: opacity 3s ease;
    z-index:25;
    font-family:'Shippori Mincho', serif;
    color:#b7c2cc;
    font-size:15px;
    letter-spacing:0.18em;
    text-align:center;
  }
  #closing.show { opacity:1; pointer-events:auto; }

  #skip {
    position:fixed; bottom:18px; right:18px;
    font-size:10px; color:rgba(180,190,200,0.28);
    letter-spacing:0.08em;
    z-index:40; cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }

  /* ===== HANIEL ANGEL REVEAL ===== */
  #hanielReveal {
    position:fixed; inset:0;
    z-index:32;
    opacity:0;
    pointer-events:none;
    transition: opacity 4s ease;
  }
  #hanielReveal.show { opacity:1; }

  .haniel-svg {
    position:absolute; inset:0;
    width:100%; height:100%;
  }

  #hanielText {
    position:absolute;
    top:6vh; left:50%; transform:translateX(-50%);
    font-family:'Shippori Mincho', serif;
    color:#e8d8a8;
    font-size:clamp(13px, 3.8vw, 16px);
    letter-spacing:0.2em;
    text-align:center;
    white-space:pre-line;
    line-height:2;
    z-index:2;
    text-shadow:0 0 28px rgba(255,210,100,0.45), 0 0 60px rgba(200,155,60,0.2);
    width:82%;
  }

  .h-petal {
    position:absolute;
    border-radius:80% 0 80% 0;
    pointer-events:none;
    opacity:0;
    animation:hPetalDrift linear infinite;
  }
  .h-leaf {
    position:absolute;
    border-radius:100% 0;
    pointer-events:none;
    opacity:0;
    animation:hLeafDrift linear infinite;
  }

  @keyframes hPetalDrift {
    0%   { transform:translate(0,0) rotate(0deg); opacity:0; }
    8%   { opacity:var(--op,0.65); }
    92%  { opacity:calc(var(--op,0.65)*0.3); }
    100% { transform:translate(var(--dx,160px),var(--dy,-220px)) rotate(var(--spin,540deg)); opacity:0; }
  }
  @keyframes hLeafDrift {
    0%   { transform:translate(0,0) rotate(0deg) scaleX(1); opacity:0; }
    10%  { opacity:var(--op,0.58); }
    50%  { transform:translate(calc(var(--dx,140px)*0.5),calc(var(--dy,-180px)*0.5)) rotate(calc(var(--spin,360deg)*0.5)) scaleX(-1); }
    90%  { opacity:calc(var(--op,0.58)*0.25); }
    100% { transform:translate(var(--dx,140px),var(--dy,-180px)) rotate(var(--spin,360deg)) scaleX(1); opacity:0; }
  }
</style>
</head>
<body>

<div id="veil">
  <div id="startWrap">
    <svg class="phones" id="phonesBtn" viewBox="0 0 64 64" fill="none">
      <path d="M12 34 V30 A20 20 0 0 1 52 30 V34" stroke="#c9d4de" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <rect x="8" y="32" width="10" height="16" rx="4" fill="#c9d4de" opacity="0.9"/>
      <rect x="46" y="32" width="10" height="16" rx="4" fill="#c9d4de" opacity="0.9"/>
    </svg>
    <div id="startLabel">listen</div>
  </div>
</div>

<div id="choiceLayer">
  <div class="choices">
    <button class="choice-btn" id="btnRelease">release</button>
    <button class="choice-btn" id="btnKeep">keep</button>
  </div>
</div>

<div id="closing"></div>
<div id="skip">reset</div>

<script>
/* ============================================================
   境界線 — boundary
   headphones as the seam between his inner voice and the world.
   four movements: intro (boundary drawn) → shadow time (angel-link
   sparkles) → angel (the lights gather into a quiet presence) →
   release (moon-mirror, one word, then silence).
   nothing is stored. nothing is scored.
============================================================ */

let scene = 'intro';       // intro -> transitioning -> shadow -> angel -> release -> end
let sceneT = 0;             // frames since scene entered
let sparkles = [];
const SPARK_TARGET = 6;
let ripples = [];
let cityLights = [];
let wingMotes = [];
let angelCenter = null;
const ANGEL_DURATION = 460;
let textAlpha = 0;
let introTextShown = false;
let shadowTextShown = false;
let releaseTextShown = false;
let horizonY;

let audioCtx = null;
let droneGain, padGain;
let started = false;

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // low drone — the sound that keeps playing when everything else stops
  const drone = audioCtx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 98;
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0;
  drone.connect(droneGain).connect(audioCtx.destination);
  drone.start();
  droneGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 3);

  // slow floating pad, an octave + fifth up, very soft
  const pad = audioCtx.createOscillator();
  pad.type = 'sine';
  pad.frequency.value = 147;
  padGain = audioCtx.createGain();
  padGain.gain.value = 0;
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.06;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.02;
  lfo.connect(lfoGain).connect(padGain.gain);
  lfo.start();
  pad.connect(padGain).connect(audioCtx.destination);
  pad.start();
  padGain.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 5);
}

function chime(freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.value = 0.0001;
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t);
  g.gain.exponentialRampToValueAtTime(0.09, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);
  osc.stop(t + 2.5);
}

function duckAudioForShadow() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  padGain.gain.linearRampToValueAtTime(0.01, t + 2.5);
  droneGain.gain.cancelScheduledValues(t);
  droneGain.gain.linearRampToValueAtTime(0.065, t + 2.5);
}

function liftAudioForAngel() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  padGain.gain.linearRampToValueAtTime(0.05, t + 3);
  droneGain.gain.cancelScheduledValues(t);
  droneGain.gain.linearRampToValueAtTime(0.045, t + 3);
}

function playAngelChimes() {
  if (!audioCtx) return;
  const notes = [523.25, 659.25, 783.99, 987.77, 1174.66];
  notes.forEach((f, i) => setTimeout(() => chime(f), i * 420));
}

function liftAudioForRelease() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  padGain.gain.linearRampToValueAtTime(0.045, t + 4);
}

function fadeAudioOut() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  droneGain.gain.cancelScheduledValues(t);
  padGain.gain.linearRampToValueAtTime(0.0001, t + 4);
  droneGain.gain.linearRampToValueAtTime(0.0001, t + 4);
}

const sketch = (p) => {

  p.setup = () => {
    const c = p.createCanvas(window.innerWidth, window.innerHeight);
    c.parent(document.body);
    horizonY = p.height * 0.58;
    for (let i = 0; i < 40; i++) {
      cityLights.push({
        x: p.random(p.width),
        y: horizonY + p.random(6, 40),
        r: p.random(0.6, 1.8),
        phase: p.random(p.TWO_PI)
      });
    }
    p.textFont('Shippori Mincho');
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    horizonY = p.height * 0.58;
  };

  function drawSky() {
    let topC, botC;
    if (scene === 'shadow') {
      topC = p.color(4, 7, 13);
      botC = p.color(6, 10, 18);
    } else if (scene === 'angel') {
      const bl = p.constrain(sceneT / ANGEL_DURATION, 0, 1);
      topC = p.lerpColor(p.color(4, 7, 13), p.color(8, 16, 30), bl);
      botC = p.lerpColor(p.color(6, 10, 18), p.color(15, 28, 46), bl);
    } else if (scene === 'release' || scene === 'end') {
      topC = p.color(8, 16, 30);
      botC = p.color(15, 28, 46);
    } else {
      topC = p.color(9, 18, 32);
      botC = p.color(16, 30, 48);
    }
    for (let y = 0; y < horizonY; y++) {
      const a = y / horizonY;
      p.stroke(p.lerpColor(topC, botC, a));
      p.line(0, y, p.width, y);
    }
  }

  function drawLake() {
    const lakeH = p.height - horizonY;
    let topC, botC;
    if (scene === 'shadow') {
      topC = p.color(5, 9, 15);
      botC = p.color(2, 4, 8);
    } else if (scene === 'angel') {
      const bl = p.constrain(sceneT / ANGEL_DURATION, 0, 1);
      topC = p.lerpColor(p.color(5, 9, 15), p.color(12, 22, 38), bl);
      botC = p.lerpColor(p.color(2, 4, 8), p.color(4, 8, 15), bl);
    } else {
      topC = p.color(12, 22, 38);
      botC = p.color(4, 8, 15);
    }
    for (let y = 0; y < lakeH; y++) {
      const a = y / lakeH;
      p.stroke(p.lerpColor(topC, botC, a));
      p.line(0, horizonY + y, p.width, horizonY + y);
    }
  }

  function moonVisibility() {
    if (scene === 'intro' || scene === 'transitioning') return p.constrain(sceneT / 90, 0, 0.35);
    if (scene === 'shadow') return 0.12;
    if (scene === 'angel') return p.constrain(sceneT / ANGEL_DURATION, 0, 0.4);
    if (scene === 'release') return p.constrain(sceneT / 140, 0, 1);
    if (scene === 'end') return 1;
    return 0;
  }

  function drawMoonAndReflection() {
    const vis = moonVisibility();
    if (vis <= 0.001) return;
    const mx = p.width * 0.5;
    const my = horizonY * 0.32;
    const r = p.width * 0.055;

    p.noStroke();
    for (let i = 6; i > 0; i--) {
      p.fill(232, 237, 242, (vis * 10) * i);
      p.circle(mx, my, r * 2 + i * 14);
    }
    p.fill(238, 240, 244, 235 * vis);
    p.circle(mx, my, r * 2);

    // reflection on water, broken into wavy horizontal slivers
    const lakeH = p.height - horizonY;
    p.noStroke();
    for (let y = 0; y < lakeH * 0.8; y += 3) {
      const spread = p.map(y, 0, lakeH, r * 1.0, r * 2.2);
      const wob = p.sin(p.frameCount * 0.02 + y * 0.12) * 10;
      const alpha = p.map(y, 0, lakeH * 0.8, 90, 4) * vis;
      p.fill(220, 230, 240, alpha);
      p.rect(mx - spread / 2 + wob, horizonY + y, spread, 2);
    }
  }

  function drawCityLights() {
    if (scene === 'shadow' || scene === 'angel' || scene === 'release' || scene === 'end') return;
    let fade = 1;
    if (scene === 'transitioning') fade = p.constrain(1 - sceneT / 70, 0, 1);
    p.noStroke();
    for (const l of cityLights) {
      const tw = 0.6 + 0.4 * p.sin(p.frameCount * 0.03 + l.phase);
      p.fill(180, 190, 170, 120 * fade * tw);
      p.circle(l.x, l.y, l.r * 3);
    }
  }

  function updateAngelConvergence() {
    if (scene !== 'angel') return;
    const t = p.constrain(sceneT / 150, 0, 1);
    const eased = t * t * (3 - 2 * t);
    for (const s of sparkles) {
      if (s.tx === undefined) continue;
      s.x = p.lerp(s.ox, s.tx, eased);
      s.y = p.lerp(s.oy, s.ty, eased);
    }
  }

  function enterAngelScene() {
    angelCenter = { x: p.width * 0.5, y: horizonY * 0.86 };
    const half = Math.floor(SPARK_TARGET / 2);
    sparkles.forEach((s, i) => {
      const side = i % 2 === 0 ? -1 : 1;
      const idx = Math.floor(i / 2);
      const t = half > 1 ? idx / (half - 1) : 0;
      const spread = 30 + t * 150;
      const rise = -10 - t * 90 - Math.sin(t * Math.PI) * 30;
      s.ox = s.x; s.oy = s.y;
      s.tx = angelCenter.x + side * spread;
      s.ty = angelCenter.y + rise;
    });

    wingMotes = [];
    for (const side of [-1, 1]) {
      for (let i = 0; i < 15; i++) {
        const t = i / 14;
        const spread = 25 + t * 165;
        const rise = -15 - 120 * Math.sin(t * Math.PI / 2) + t * t * 35;
        wingMotes.push({
          bx: side * spread + p.random(-6, 6),
          by: rise + p.random(-6, 6),
          phase: p.random(p.TWO_PI)
        });
      }
    }
  }

  function drawWingMotes() {
    if (scene !== 'angel' || !angelCenter) return;
    const fadeIn = p.constrain(sceneT / 140, 0, 1);
    const fadeOut = p.constrain((ANGEL_DURATION - sceneT) / 120, 0, 1);
    const alphaMul = Math.min(fadeIn, fadeOut);
    if (alphaMul <= 0) return;
    p.noStroke();
    for (const m of wingMotes) {
      const pulse = (0.6 + 0.4 * p.sin(p.frameCount * 0.04 + m.phase)) * alphaMul;
      const x = angelCenter.x + m.bx;
      const y = angelCenter.y + m.by;
      for (let i = 3; i > 0; i--) {
        p.fill(245, 228, 190, 8 * i * pulse);
        p.circle(x, y, (4 + i * 5) * pulse);
      }
      p.fill(250, 240, 210, 200 * pulse);
      p.circle(x, y, 2.4);
    }
  }

  function drawSparklesAndRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.age++;
      const alpha = p.map(r.age, 0, 60, 90, 0);
      if (alpha <= 0) { ripples.splice(i, 1); continue; }
      p.noFill();
      p.stroke(210, 220, 235, alpha);
      p.strokeWeight(1);
      p.circle(r.x, r.y, r.age * 1.6);
    }

    if (scene === 'shadow' || scene === 'angel') {
      let fadeMul = 1;
      if (scene === 'angel') fadeMul = p.constrain((ANGEL_DURATION - sceneT) / 120, 0, 1);
      for (const s of sparkles) {
        const pulse = (0.7 + 0.3 * p.sin(p.frameCount * 0.05 + s.phase)) * fadeMul;
        p.noStroke();
        for (let i = 4; i > 0; i--) {
          p.fill(240, 220, 168, 10 * i * pulse);
          p.circle(s.x, s.y, (6 + i * 6) * pulse);
        }
        p.fill(250, 236, 200, 230 * pulse);
        p.circle(s.x, s.y, 4);
      }
    }
  }

  function drawText(msg, alphaTarget, yFrac) {
    p.noStroke();
    p.fill(201, 212, 222, alphaTarget);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(p.min(18, p.width * 0.045));
    p.textLeading(30);
    p.text(msg, p.width / 2, p.height * yFrac, p.width * 0.8);
  }

  p.draw = () => {
    p.background(5, 9, 15);
    drawSky();
    drawLake();
    drawCityLights();
    drawMoonAndReflection();
    updateAngelConvergence();
    drawSparklesAndRipples();
    drawWingMotes();

    sceneT++;

    if (scene === 'transitioning' && sceneT > 90) {
      scene = 'shadow';
      sceneT = 0;
      duckAudioForShadow();
    }

    if (scene === 'intro' && !introTextShown && sceneT > 40) {
      introTextShown = true;
    }
    if (scene === 'intro') {
      const a = p.constrain((sceneT - 40) / 60, 0, 1) * 210;
      if (sceneT > 40) drawText('This is his inner voice.', a, 0.14);
    }

    if (scene === 'shadow') {
      if (!shadowTextShown && sceneT > 30) shadowTextShown = true;
      if (sceneT > 30 && sceneT < 260) {
        const a = p.constrain(1 - Math.abs(sceneT - 100) / 160, 0, 1) * 190;
        drawText('Every light in the city stops.\nOnly his sound keeps moving.', a, 0.16);
      }
      if (sparkles.length > 0 && sparkles.length < SPARK_TARGET && sceneT > 260) {
        drawText('Touch the water. One light at a time.', 130, 0.86);
      }
      if (sparkles.length === 0 && sceneT > 260) {
        drawText('Touch the water. One light at a time.', 150, 0.86);
      }
      if (sparkles.length >= SPARK_TARGET && scene === 'shadow') {
        scene = 'angel';
        sceneT = 0;
        enterAngelScene();
        liftAudioForAngel();
        playAngelChimes();
      }
    }

    if (scene === 'angel') {
      if (sceneT > 40 && sceneT < 260) {
        const a = p.constrain(1 - Math.abs(sceneT - 150) / 190, 0, 1) * 200;
        drawText('The lights gather into something larger.', a, 0.16);
      }
      if (sceneT >= 260 && sceneT < ANGEL_DURATION) {
        const mid = 260 + (ANGEL_DURATION - 260) / 2;
        const a = p.constrain(1 - Math.abs(sceneT - mid) / ((ANGEL_DURATION - 260) / 2), 0, 1) * 200;
        drawText('It asks nothing of you. It only stays.', a, 0.16);
      }
      if (sceneT >= ANGEL_DURATION) {
        scene = 'release';
        sceneT = 0;
        wingMotes = [];
        liftAudioForRelease();
      }
    }

    if (scene === 'release') {
      if (sceneT > 60 && sceneT < 340) {
        const a = p.constrain(1 - Math.abs(sceneT - 190) / 210, 0, 1) * 200;
        drawText('The light is full. The water mirrors the moon.', a, 0.16);
      }
      if (sceneT === 260) showChoices();
    }

    if (scene === 'end') {
      // canvas stays, just quiet — DOM overlay carries the closing line
    }
  };

  window.__handleTap = (x, y) => {
    if (scene !== 'shadow') return;
    if (x === undefined || y === undefined) return;
    if (sparkles.length >= SPARK_TARGET) return;
    sparkles.push({ x, y, phase: p.random(p.TWO_PI) });
    ripples.push({ x, y, age: 0 });
    const notes = [392, 440, 493.88, 523.25, 587.33, 659.25];
    chime(notes[sparkles.length - 1] || 660);
  };
};

new p5(sketch);

// Use a single, uniform pointerdown listener for taps/clicks — more
// reliable across mobile browsers than relying on p5's built-in
// touchStarted/mousePressed, which can conflict with each other.
window.addEventListener('pointerdown', (e) => {
  if (e.target.closest('#veil, #choiceLayer, #closing, #skip')) return;
  window.__handleTap && window.__handleTap(e.clientX, e.clientY);
});

function showChoices() {
  const layer = document.getElementById('choiceLayer');
  layer.classList.add('show');
  requestAnimationFrame(() => {
    document.getElementById('btnRelease').classList.add('visible');
    document.getElementById('btnKeep').classList.add('visible');
  });
}

function finishWith(message) {
  const layer = document.getElementById('choiceLayer');
  layer.classList.remove('show');
  scene = 'end';
  sceneT = 0;
  fadeAudioOut();
  const closing = document.getElementById('closing');
  closing.textContent = message;
  setTimeout(() => closing.classList.add('show'), 200);
}

document.getElementById('btnRelease').addEventListener('click', () => {
  finishWith('What you released\nno longer holds you.');
  setTimeout(() => showHanielAngel('What you released\nno longer holds you.'), 4400);
});
document.getElementById('btnKeep').addEventListener('click', () => {
  finishWith('What you kept\nquietly keeps glowing within you.');
});

function startExperience() {
  if (started) return;
  started = true;
  setupAudio();
  document.getElementById('veil').classList.add('hidden');
  scene = 'transitioning';
  sceneT = 0;
}
document.getElementById('phonesBtn').addEventListener('click', startExperience);
document.getElementById('phonesBtn').addEventListener('pointerdown', startExperience);

document.getElementById('skip').addEventListener('click', () => {
  location.reload();
});

/* ---------- Haniel angel reveal ---------- */
function showHanielAngel(message) {
  document.getElementById('hanielText').textContent = message;

  // Fade out the previous closing overlay so only the angel scene remains
  const closing = document.getElementById('closing');
  closing.style.transition = 'opacity 2.5s ease';
  closing.style.opacity = '0';

  // Spawn animated petals & leaves
  const reveal = document.getElementById('hanielReveal');
  const petalColors = [
    'rgba(255,255,255,0.82)', 'rgba(255,255,255,0.72)',
    'rgba(248,208,218,0.78)', 'rgba(240,192,202,0.7)',
    'rgba(252,240,228,0.74)', 'rgba(240,228,210,0.68)'
  ];
  const leafColors = [
    'rgba(90,148,58,0.72)', 'rgba(78,136,48,0.65)',
    'rgba(108,168,72,0.62)', 'rgba(68,124,42,0.6)'
  ];

  for (let i = 0; i < 18; i++) {
    const isPetal = i < 12;
    const el = document.createElement('div');
    el.className = isPetal ? 'h-petal' : 'h-leaf';
    const startX = Math.random() * 85 + 5;  // 5–90vw
    const startY = Math.random() * 80 + 10; // 10–90vh
    const size  = isPetal ? (Math.random() * 10 + 8) : (Math.random() * 12 + 9);
    const op    = (Math.random() * 0.3 + 0.45).toFixed(2);
    const dx    = (Math.random() * 200 + 80).toFixed(0);
    const dy    = -(Math.random() * 260 + 120).toFixed(0);
    const spin  = ((Math.random() > 0.5 ? 1 : -1) * (Math.random() * 480 + 200)).toFixed(0) + 'deg';
    const dur   = (Math.random() * 6 + 7).toFixed(1);
    const delay = (Math.random() * 5).toFixed(1);
    const color = isPetal
      ? petalColors[Math.floor(Math.random() * petalColors.length)]
      : leafColors[Math.floor(Math.random() * leafColors.length)];

    el.style.cssText = [
      `left:${startX}vw`, `top:${startY}vh`,
      `width:${size}px`, `height:${(size * (isPetal ? 0.58 : 1)).toFixed(1)}px`,
      `background:${color}`,
      `--op:${op}`, `--dx:${dx}px`, `--dy:${dy}px`, `--spin:${spin}`,
      `animation-duration:${dur}s`,
      `animation-delay:${delay}s`,
      `animation-iteration-count:infinite`
    ].join(';');

    reveal.appendChild(el);
  }

  reveal.classList.add('show');
}
</script>
